    function AbacusCtrl(type) {

    function Abacus(parentDivId, type) {

      function canvasMouseDown(e) {
        const pos = getMouse(e);
        const found = mouseOverElement(pos);
        if (found !== -1 && uiElements[found].type === 0) {
          abacusCtrl.activated(uiElements[found].ref);
          abacus.update();

      function canvasMouseMove(e) {
        const pos = getMouse(e);
        hooveredBead = -1;

        if (found !== -1) hooveredBead = uiElements[found].ref;
        abacus.update();
      }

      function getMouse(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        return {
          x: (e.clientX - rect.left) * scaleX,
          y: (e.clientY - rect.top) * scaleY
        };
      }

      function mouseOverElement(pos) {
        for (let i = 0; i < uiElements.length; i++) {
          const el = uiElements[i];
          if (
            el.x - 10 < pos.x &&
            el.x2 + 10 > pos.x &&

            return i;
          }
        }
        return -1;

      this.update = function () {
        canvas.width = canvas.width;
        ctx = canvas.getContext("2d");
        uiElements = [];

        ctx.strokeStyle = "#000";
        ctx.lineWidth = 5;

        // vertical columns
        for (let i = 0; i < abacusCtrl.beadLines; i++) {
          const x = -30 + abacusCtrl.beadLines * abacusCtrl.beadSpacing - i * abacusCtrl.beadSpacing;
          const y = 20 + (abacusCtrl.beadPerLine + 2) * abacusCtrl.beadHeight;
          ctx.beginPath();
          ctx.moveTo(x, 20);
          ctx.lineTo(x, y);

        // horizontal frame lines (middle only)
        let y = 20 + (abacusCtrl.beadPerLine - abacusCtrl.beadSep) * abacusCtrl.beadHeight;

          const width = abacusCtrl.beadWidth;
          const height = abacusCtrl.beadHeight - marginY * 2;

          const radius = 15;

          ctx.fillStyle = "#C9B194";
          ctx.strokeStyle = ctx.fillStyle;
          ctx.lineJoin = "round";
          ctx.lineWidth = radius;
          ctx.strokeRect(x + (radius / 2), y + (radius / 2), width - radius, height - radius);
          ctx.fillRect(x + (radius / 2), y + (radius / 2), width - radius, height - radius);

          const margin = 10;
          uiElements.push(new UIElement(
            x - margin,
            y - margin,
            width + margin * 2,
            height + margin * 2,
            0,
            i
          ));
        }

        ctx.fillStyle = "#000";
        ctx.textAlign = "center";
        ctx.font = "20pt sans-serif";
        const textY = 50 + (abacusCtrl.beadPerLine + 2) * abacusCtrl.beadHeight;

        for (let i = 0; i < abacusCtrl.beadLines; i++) {
          const textX = -30 + abacusCtrl.beadLines * abacusCtrl.beadSpacing - i * abacusCtrl.beadSpacing;

            if (abacusCtrl.nodes[n].active) valueSum += abacusCtrl.nodes[n].value;
          }
          ctx.fillText(valueSum.toString(10), textX, textY);
        }

        for (let j = 0; j < numOperands; j++) {
          let useDigits1 = j < Math.floor(numOperands / 2);
          let digits = digits1 === digits2 ? digits1 : (useDigits1 ? digits1 : digits2);
          let min = Math.pow(10, digits - 1);
          let max = Math.pow(10, digits) - 1;
          let num = Math.floor(min + Math.random() * (max - min + 1));
          numbers.push(num);
        }

        let subtractionCount = numOperands > 5 ? 2 : 1;
        let usedIndexes = new Set();
        for (let s = 0; s < subtractionCount; s++) {
          let subtractionIndex;
          do {
            subtractionIndex = Math.floor(Math.random() * (numOperands - 1)) + 1;
          } while (usedIndexes.has(subtractionIndex));
          usedIndexes.add(subtractionIndex);
          let maxSub = numbers[subtractionIndex - 1];
          let subNum = Math.floor(Math.random() * maxSub);
          if (subNum <= 0) subNum = 1;
          numbers[subtractionIndex] = -subNum;

        let answer = numbers.reduce((a, b) => a + b, 0);
